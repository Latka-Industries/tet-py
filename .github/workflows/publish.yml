name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist
          sccache: "true"
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.target }}
          path: dist/*.whl

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --target universal2-apple-darwin
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-universal2
          path: dist/*.whl

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  smoke:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-linux-*
          merge-multiple: true
          path: dist

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install linux x86_64 wheel
        run: |
          uv venv /tmp/tet-smoke
          uv pip install --python /tmp/tet-smoke/bin/python dist/*manylinux*x86_64*.whl
          /tmp/tet-smoke/bin/python -c "import tet; print('tet-py', tet.__version__, 'tetration', tet.core_version())"

  publish:
    name: Upload to PyPI
    needs: [linux, macos, windows, sdist, smoke]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
